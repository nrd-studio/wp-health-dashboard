<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP Health Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05090d;--surface:#0b1320;--surface2:#101d2e;--border:#192940;--accent:#06cfe0;--accent-d:rgba(6,207,224,.10);--accent-g:rgba(6,207,224,.22);--green:#1bd97a;--amber:#f5a623;--red:#ff4455;--t1:#e0ecf8;--t2:#7ba3c0;--t3:#3d6482;--mono:'DM Mono',monospace;--display:'Syne','Hiragino Kaku Gothic ProN',sans-serif}
html,body,#root{min-height:100vh;background:var(--bg);color:var(--t1);font-family:var(--display);font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1f3450;border-radius:2px}
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(6,207,224,.06),transparent 60%)}
.setup-card{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-box{width:52px;height:52px;background:var(--accent-d);border:1px solid var(--accent);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px}
.logo-name{font-size:22px;font-weight:800;letter-spacing:-1px}
.logo-sub{font-size:11px;color:var(--t2);margin-top:4px;font-weight:600}
.field{margin-bottom:16px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--t1);font-family:var(--mono);font-size:13px;outline:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-d)}
.field input::placeholder{color:var(--t3)}
.btn-primary{width:100%;background:var(--accent);color:#000;border:none;border-radius:7px;padding:13px;font-family:var(--display);font-size:14px;font-weight:800;cursor:pointer;margin-top:8px}
.btn-primary:hover{opacity:.88}
.info-box{margin-top:18px;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--t3);line-height:1.7}
.info-box strong{color:var(--t2)}
.err-box{margin-bottom:14px;padding:11px 13px;background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.3);border-radius:6px;font-size:12px;color:var(--red);line-height:1.7;white-space:pre-wrap}
.scanning{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:24px}
.scan-heading{font-size:15px;font-weight:700;color:var(--t2)}
.scan-box{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;display:flex;flex-direction:column;gap:10px}
.scan-line{font-family:var(--mono);font-size:12px;color:var(--t2);display:flex;align-items:center;gap:10px;animation:fadeIn .3s ease}
.scan-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
@keyframes fadeIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.dash{min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.hdr-logo{font-size:14px;font-weight:800;color:var(--accent);white-space:nowrap}
.hdr-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.hdr-url{font-family:var(--mono);font-size:11px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.hdr-time{font-family:var(--mono);font-size:10px;color:var(--t3);white-space:nowrap}
.btn-sm{background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--t2);padding:5px 11px;font-family:var(--display);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accent-d);border:1px solid var(--accent);color:var(--accent);border-radius:5px;padding:5px 13px;font-family:var(--display);font-size:11px;font-weight:800;cursor:pointer}
.btn-accent:hover{background:var(--accent-g)}
.btn-accent:disabled{opacity:.45;cursor:not-allowed}
.content{padding:20px;flex:1;max-width:1080px;margin:0 auto;width:100%}
.score-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 22px;margin-bottom:18px;display:flex;align-items:center;gap:18px}
.score-num{font-size:32px;font-weight:800;font-family:var(--mono);min-width:72px;line-height:1}
.score-track{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width .8s ease}
.score-label{font-size:12px;color:var(--t2);white-space:nowrap}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:18px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.scard-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:9px}
.scard-ver{font-family:var(--mono);font-size:22px;font-weight:500;margin-bottom:4px}
.scard-sub{font-size:11px;color:var(--t2);margin-bottom:9px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge.red{background:rgba(255,68,85,.12);color:var(--red);border:1px solid rgba(255,68,85,.3)}
.badge.green{background:rgba(27,217,122,.1);color:var(--green);border:1px solid rgba(27,217,122,.25)}
.badge.amber{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.25)}
.scard-btn{margin-top:11px;border-radius:5px;padding:6px 10px;font-family:var(--display);font-size:11px;font-weight:700;cursor:pointer;width:100%;border:1px solid rgba(245,166,35,.3);background:rgba(245,166,35,.1);color:var(--amber)}
.scard-btn:disabled{opacity:.4;cursor:not-allowed}
.scard-btn.analyzing,.scard-btn.updating{color:var(--accent);border-color:rgba(6,207,224,.3);background:var(--accent-d);animation:blink 1s ease infinite}
.scard-btn.done{color:var(--green);border-color:rgba(27,217,122,.3);background:rgba(27,217,122,.08)}
.scard-btn.php-check{border-color:rgba(255,68,85,.35);background:rgba(255,68,85,.1);color:var(--red)}
.scard-btn.php-checking{color:var(--accent);border-color:rgba(6,207,224,.3);background:var(--accent-d);animation:blink 1s ease infinite}
.php-report{margin-top:12px;padding:11px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--t2);line-height:1.8;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.section-title{font-size:13px;font-weight:700}
.section-sub{font-size:11px;color:var(--t3)}
.ptable{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px}
.pthead{display:grid;grid-template-columns:1fr 100px 100px 82px 130px;padding:8px 18px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3)}
.prow{display:grid;grid-template-columns:1fr 100px 100px 82px 130px;padding:12px 18px;border-bottom:1px solid var(--border);align-items:center}
.prow:last-child{border-bottom:none}
.prow:hover{background:var(--surface2)}
.pname{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.inactive-tag{font-size:9px;color:var(--t3);background:var(--surface2);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
.pver{font-family:var(--mono);font-size:11px;color:var(--t2)}
.pver-new{font-family:var(--mono);font-size:11px;color:var(--amber);font-weight:500}
.pver-ok{font-family:var(--mono);font-size:11px;color:var(--t3)}
.upd-btn{border-radius:5px;padding:4px 9px;font-family:var(--display);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid rgba(245,166,35,.3);background:rgba(245,166,35,.1);color:var(--amber)}
.upd-btn:disabled{opacity:.4;cursor:not-allowed}
.upd-btn.analyzing,.upd-btn.updating{color:var(--accent);border-color:rgba(6,207,224,.3);background:var(--accent-d);animation:blink 1s ease infinite}
.upd-btn.done{color:var(--green);border-color:rgba(27,217,122,.3);background:rgba(27,217,122,.08);cursor:default}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;animation:overlayIn .2s ease}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.8);animation:modalIn .25s ease}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:800}
.modal-close{background:none;border:none;color:var(--t3);font-size:22px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--t1)}
.modal-body{padding:16px 22px}
.modal-plugin-name{font-size:15px;font-weight:800;margin-bottom:6px}
.modal-ver{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:13px;margin-bottom:14px}
.modal-risk-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:800}
.modal-divider{height:1px;background:var(--border);margin:0 22px}
.modal-analysis{padding:18px 22px;font-size:12px;line-height:1.85;color:var(--t2);white-space:pre-wrap;overflow-y:auto;max-height:280px}
.modal-items{padding:12px 22px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--t2);line-height:1.8}
.modal-footer{display:flex;gap:10px;padding:14px 22px;border-top:1px solid var(--border);justify-content:flex-end}
.modal-cancel{background:transparent;border:1px solid var(--border);color:var(--t2);border-radius:6px;padding:8px 16px;font-family:var(--display);font-size:12px;font-weight:700;cursor:pointer}
.modal-cancel:hover{border-color:var(--accent);color:var(--accent)}
.modal-ok{border:none;border-radius:6px;padding:8px 18px;font-family:var(--display);font-size:12px;font-weight:800;cursor:pointer;background:var(--accent);color:#000}
.modal-ok:hover{opacity:.88}
.modal-ok.danger{background:var(--red);color:#fff}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:11px 16px;border-radius:8px;font-size:12px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .3s ease;z-index:400}
@media(max-width:600px){.summary-row{grid-template-columns:1fr}.pthead,.prow{grid-template-columns:1fr 80px 90px}.pthead span:nth-child(2),.prow>*:nth-child(2),.pthead span:nth-child(4),.prow>*:nth-child(4){display:none}.hdr-time{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<script>
var e = React.createElement;
var useState = React.useState;

/* ── API ── */
function wpReq(siteUrl, apiKey, path, method, body) {
  var p = new URLSearchParams({ siteUrl: siteUrl, apiKey: apiKey, path: path });
  var opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch('/api/proxy?' + p, opts).then(function(r) {
    return r.json().then(function(d) {
      if (!r.ok) throw new Error(d.error || 'HTTP ' + r.status);
      return d;
    });
  });
}

/* ── AI分析 ── */
function aiAnalyze(prompt) {
  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1200, messages: [{ role: 'user', content: prompt }] })
  }).then(function(r) { return r.json(); }).then(function(j) {
    var text = j.content && j.content[0] ? j.content[0].text : '分析失敗';
    var m = text.match(/RISK:(高|中|低)/);
    return { riskLevel: m ? m[1] : '中', analysis: text.replace(/^RISK:(高|中|低)\n?/, '').trim() };
  });
}


function phpCheckPrompt(phpCurrent, phpTarget, plugins, files) {
  var fc = (files || []).map(function(f) { return '// ' + f.name + '\n' + f.content; }).join('\n\n').slice(0, 15000);
  var pluginList = plugins.map(function(p) { return '- ' + p.name + ' ' + p.current; }).join('\n');
  return 'WordPressサイトのPHPを ' + phpCurrent + ' から ' + phpTarget + ' にアップグレードする場合の互換性を詳しく分析してください。\n\n【インストール済みプラグイン一覧】\n' + pluginList + '\n\n【テーマPHPファイル】\n```php\n' + (fc || '取得できませんでした') + '\n```\n\nPHP ' + phpCurrent + ' → ' + phpTarget + ' の主な破壊的変更（create_function廃止、型の厳格化、each廃止、文字列補間変更、null安全演算子など）に照らして以下を日本語で報告してください：\n\n1. テーマコード内の問題箇所（ファイル名と具体的なコード片）\n2. 各プラグインのPHP 8.x対応状況（既知の情報で概要を）\n3. アップグレード前に必要な修正作業のリスト\n4. 総合リスク評価（🔴高/🟡中/🟢低）と推奨アクション';
}

function riskPrompt(name, from, to, files) {
  var fc = (files || []).map(function(f) { return '// ' + f.name + '\n' + f.content; }).join('\n\n').slice(0, 12000);
  return 'WordPressテーマのPHPを分析し、「' + name + '」を ' + from + ' → ' + to + ' にアップデートするリスクを評価してください。\n\n【テーマPHP】\n```php\n' + (fc || '取得できませんでした') + '\n```\n\n1行目にRISK:高/中/低のみ。2行目以降に使用フック・関数名、衝突リスク、修正箇所、推奨アクションを日本語で。';
}

function riskAllPrompt(plugins, wpUpd, files) {
  var fc = (files || []).map(function(f) { return '// ' + f.name + '\n' + f.content; }).join('\n\n').slice(0, 12000);
  var lines = [];
  if (wpUpd) lines.push('WordPress本体: ' + wpUpd.current + ' → ' + wpUpd.latest);
  plugins.forEach(function(p) { lines.push(p.name + ': ' + p.current + ' → ' + p.latest); });
  return '全アップデートの総合リスクを評価してください。\n\n【更新対象】\n' + lines.join('\n') + '\n\n【テーマPHP】\n```php\n' + (fc || '取得できませんでした') + '\n```\n\n1行目にRISK:高/中/低のみ。2行目以降に衝突リスクと推奨更新順序を日本語で。';
}

var STEPS = ['サイトへ接続中...', 'WordPress バージョンを確認中...', 'PHP バージョンを確認中...', 'プラグイン一覧を取得中...', '最新バージョンを照合中...', 'テーマファイルを読み込み中...', 'レポートを生成中...'];

/* ── App ── */
function App() {
  var ph = useState('setup');     var phase = ph[0],    setPhase = ph[1];
  var fm = useState({url:'',apiKey:''}); var form = fm[0], setForm = fm[1];
  var lg = useState([]);          var log = lg[0],      setLog = lg[1];
  var dt = useState(null);        var data = dt[0],     setData = dt[1];
  var tf = useState([]);          var theme = tf[0],    setTheme = tf[1];
  var ps = useState({});          var pst = ps[0],      setPst = ps[1];
  var cs = useState('idle');      var cst = cs[0],      setCst = cs[1];
  var md = useState(null);        var modal = md[0],    setModal = md[1];
  var ts = useState(null);        var toast = ts[0],    setToast = ts[1];
  var aa = useState(false);       var aall = aa[0],     setAall = aa[1];
  var cn = useState(null);        var conn = cn[0],     setConn = cn[1];
  var er = useState(null);        var err = er[0],      setErr = er[1];

  function showToast(msg) { setToast(msg); setTimeout(function() { setToast(null); }, 3200); }

  function scan() {
    setErr(null);
    if (!form.url || !form.apiKey) { setErr('URLとAPIキーを入力してください'); return; }
    var url = form.url.replace(/\/$/, '');
    var key = form.apiKey;
    setPhase('scanning'); setLog([]); setPst({}); setCst('idle'); setConn({ url: url, apiKey: key });
    var i = 0;
    function tick() {
      if (i < 4) {
        setTimeout(function() {
          var s = STEPS[i]; i++;
          setLog(function(p) { return p.concat([s]); });
          tick();
        }, 350 + Math.random() * 200);
      } else {
        wpReq(url, key, '/status').then(function(d) {
          setLog(function(p) { return p.concat([STEPS[4]]); });
          setData(d);
          wpReq(url, key, '/theme-files').then(function(t) {
            setTheme(t.files || []);
          }).catch(function() {
            setTheme([]);
          }).finally(function() {
            setLog(function(p) { return p.concat([STEPS[5], STEPS[6]]); });
            setTimeout(function() { setPhase('dashboard'); }, 500);
          });
        }).catch(function(ex) {
          setPhase('setup');
          setErr('接続できませんでした。\n・URLが正しいか確認（例: https://your-site.com）\n・プラグインが有効化されているか確認\n・APIキーが正しいか確認\n\nエラー: ' + ex.message);
        });
      }
    }
    tick();
  }

  function doPlugin(slug) {
    setPst(function(p) { var n = Object.assign({}, p); n[slug] = 'updating'; return n; });
    wpReq(conn.url, conn.apiKey, '/update/plugin', 'POST', { slug: slug }).then(function() {
      setData(function(d) {
        return Object.assign({}, d, { plugins: d.plugins.map(function(x) {
          return x.slug === slug ? Object.assign({}, x, { current: x.latest, updateAvailable: false }) : x;
        })});
      });
      setPst(function(p) { var n = Object.assign({}, p); n[slug] = 'done'; return n; });
      var nm = slug; if (data) data.plugins.forEach(function(x) { if (x.slug === slug) nm = x.name; });
      showToast('✓ ' + nm + ' を更新しました');
    }).catch(function(ex) {
      setPst(function(p) { var n = Object.assign({}, p); n[slug] = 'idle'; return n; });
      showToast('❌ 更新失敗: ' + ex.message);
    });
  }

  function doCore() {
    setCst('updating');
    wpReq(conn.url, conn.apiKey, '/update/core', 'POST').then(function() {
      setData(function(d) {
        return Object.assign({}, d, { wordpress: Object.assign({}, d.wordpress, { current: d.wordpress.latest, updateAvailable: false }) });
      });
      setCst('done'); showToast('✓ WordPress を更新しました');
    }).catch(function(ex) { setCst('idle'); showToast('❌ 更新失敗: ' + ex.message); });
  }

  function initPlugin(slug) {
    setPst(function(p) { var n = Object.assign({}, p); n[slug] = 'analyzing'; return n; });
    var plugin = data.plugins.find(function(x) { return x.slug === slug; });
    aiAnalyze(riskPrompt(plugin.name, plugin.current, plugin.latest, theme)).then(function(r) {
      setModal({ plugin: plugin, riskLevel: r.riskLevel, analysis: r.analysis, onOk: function() { setModal(null); doPlugin(slug); } });
    }).catch(function() {
      setModal({ plugin: plugin, riskLevel: '中', analysis: 'リスク分析の取得に失敗しました。テスト環境での確認を推奨します。', onOk: function() { setModal(null); doPlugin(slug); } });
    }).finally(function() {
      setPst(function(p) { var n = Object.assign({}, p); n[slug] = 'idle'; return n; });
    });
  }


  var pc2 = useState('idle');   var phpSt = pc2[0],   setPhpSt = pc2[1];
  var pr = useState(null);      var phpRep = pr[0],   setPhpRep = pr[1];


  function initPhpCheck() {
    setPhpSt('checking'); setPhpRep(null);
    aiAnalyze(phpCheckPrompt(data.php.current, data.php.recommended, data.plugins, theme)).then(function(r) {
      setPhpRep(r.analysis);
      setPhpSt('done');
    }).catch(function() {
      setPhpRep('互換性チェックの取得に失敗しました。');
      setPhpSt('idle');
    });
  }

  function initCore() {
    setCst('analyzing');
    var fp = { name: 'WordPress 本体', current: data.wordpress.current, latest: data.wordpress.latest };
    aiAnalyze(riskPrompt(fp.name, fp.current, fp.latest, theme)).then(function(r) {
      setModal({ plugin: fp, riskLevel: r.riskLevel, analysis: r.analysis, onOk: function() { setModal(null); doCore(); } });
    }).catch(function() {
      setModal({ plugin: fp, riskLevel: '中', analysis: 'リスク分析の取得に失敗しました。', onOk: function() { setModal(null); doCore(); } });
    }).finally(function() { setCst('idle'); });
  }

  function initAll() {
    setAall(true);
    var pp = data.plugins.filter(function(x) { return x.updateAvailable; });
    var pc = data.wordpress.updateAvailable && cst !== 'done';
    var items = [];
    if (pc) items.push('WordPress 本体: ' + data.wordpress.current + ' → ' + data.wordpress.latest);
    pp.forEach(function(p) { items.push(p.name + ': ' + p.current + ' → ' + p.latest); });
    aiAnalyze(riskAllPrompt(pp, pc ? data.wordpress : null, theme)).then(function(r) {
      setModal({
        isAll: true, count: items.length, items: items,
        riskLevel: r.riskLevel, analysis: r.analysis,
        onOk: function() {
          setModal(null);
          if (pc) doCore();
          pp.forEach(function(p) { doPlugin(p.slug); });
          showToast('更新を開始しました');
        }
      });
    }).catch(function() {
      setModal({ isAll: true, count: items.length, items: items, riskLevel: '中', analysis: '一括リスク分析の取得に失敗しました。', onOk: function() { setModal(null); } });
    }).finally(function() { setAall(false); });
  }

  /* ── RENDER ── */
  if (phase === 'setup') {
    return e('div', { className: 'setup' },
      e('div', { className: 'setup-card' },
        e('div', { className: 'logo-wrap' },
          e('div', { className: 'logo-box' }, '🩺'),
          e('div', { className: 'logo-name' }, 'WP Health'),
          e('div', { className: 'logo-sub' }, 'WordPress Maintenance Dashboard')
        ),
        e('div', { className: 'field' }, e('label', null, 'サイト URL'),
          e('input', { value: form.url, placeholder: 'https://your-site.com',
            onChange: function(ev) { setForm(function(f) { return Object.assign({}, f, { url: ev.target.value }); }); } })
        ),
        e('div', { className: 'field' }, e('label', null, 'API キー'),
          e('input', { type: 'password', value: form.apiKey, placeholder: 'wph_xxxxxxxxxxxxxxxxxxxx',
            onChange: function(ev) { setForm(function(f) { return Object.assign({}, f, { apiKey: ev.target.value }); }); } })
        ),
        err ? e('div', { className: 'err-box' }, err) : null,
        e('button', { className: 'btn-primary', onClick: scan }, 'スキャン開始'),
        e('div', { className: 'info-box' },
          e('strong', null, '接続方法'), e('br'), '① WP Health Agent プラグインをWordPressにインストール・有効化',
          e('br'), '② 設定 → WP Health Agent でAPIキーを生成',
          e('br'), '③ 上記フォームにURLとAPIキーを入力'
        )
      )
    );
  }

  if (phase === 'scanning') {
    return e('div', { className: 'scanning' },
      e('div', { className: 'scan-heading' }, 'サイトをスキャン中...'),
      e('div', { className: 'scan-box' },
        log.map(function(line, i) {
          return e('div', { key: i, className: 'scan-line' },
            e('span', { className: 'scan-dot', style: { background: i === log.length - 1 ? 'var(--accent)' : 'var(--green)', animation: i === log.length - 1 ? 'pulse 1s ease infinite' : 'none' } }),
            line
          );
        })
      )
    );
  }

  /* dashboard */
  var sc = 100;
  if (data.php.status === 'eol') sc -= 35;
  if (data.wordpress.updateAvailable) sc -= 20;
  sc -= data.plugins.filter(function(p) { return p.updateAvailable; }).length * 7;
  sc = Math.max(sc, 0);
  var scol = sc >= 80 ? 'var(--green)' : sc >= 55 ? 'var(--amber)' : 'var(--red)';
  var slbl = sc >= 80 ? '良好' : sc >= 55 ? '要対応' : '緊急';
  var pendingPlugins = data.plugins.filter(function(p) { return p.updateAvailable; });
  var tot = (data.wordpress.updateAvailable && cst !== 'done' ? 1 : 0) + pendingPlugins.filter(function(p) { return pst[p.slug] !== 'done'; }).length;
  var wpNeed = data.wordpress.updateAvailable && cst !== 'done';
  var phpEol = data.php.status === 'eol';
  var wpLbl = { idle: '→ ' + data.wordpress.latest + ' へ更新', analyzing: 'リスク分析中...', updating: '更新中...', done: '✓ 完了' }[cst] || '更新する';

  return e('div', { className: 'dash' },
    e('header', { className: 'hdr' },
      e('span', { className: 'hdr-logo' }, 'WP Health'),
      e('span', { className: 'hdr-sep' }),
      e('span', { className: 'hdr-url' }, data.site && data.site.url || conn && conn.url || ''),
      e('span', { className: 'hdr-time' }, 'スキャン: ' + new Date().toLocaleTimeString('ja-JP')),
      e('button', { className: 'btn-sm', onClick: function() { setPhase('setup'); } }, '← 設定'),
      e('button', { className: 'btn-sm', onClick: scan }, '再スキャン'),
      tot > 0 ? e('button', { className: 'btn-accent', onClick: initAll, disabled: aall }, aall ? '一括分析中...' : '一括リスク分析 + 更新 (' + tot + '件)') : null
    ),
    e('div', { className: 'content' },
      e('div', { className: 'score-bar' },
        e('div', { className: 'score-num', style: { color: scol } }, sc),
        e('div', { className: 'score-track' }, e('div', { className: 'score-fill', style: { width: sc + '%', background: scol } })),
        e('div', { className: 'score-label' }, '健康スコア ', e('strong', { style: { color: scol } }, slbl))
      ),
      e('div', { className: 'summary-row' },
        e('div', { className: 'scard', style: { '--c': wpNeed ? 'var(--amber)' : 'var(--green)' } },
          e('div', { className: 'scard-label' }, 'WordPress Core'),
          e('div', { className: 'scard-ver' }, data.wordpress.current),
          e('div', { className: 'scard-sub' }, '最新: ' + data.wordpress.latest),
          wpNeed ? e('span', { className: 'badge amber' }, '⬆ 更新あり') : e('span', { className: 'badge green' }, '✓ 最新'),
          wpNeed ? e('button', { className: 'scard-btn ' + (cst !== 'idle' ? cst : ''), onClick: initCore, disabled: cst !== 'idle' }, wpLbl) : null
        ),
        e('div', { className: 'scard', style: { '--c': phpEol ? 'var(--red)' : 'var(--green)' } },
          e('div', { className: 'scard-label' }, 'PHP バージョン'),
          e('div', { className: 'scard-ver' }, data.php.current),
          e('div', { className: 'scard-sub' }, '推奨: ' + data.php.recommended + ' 以上'),
          phpEol ? e('span', { className: 'badge red' }, '⚠ EOL・危険') : e('span', { className: 'badge green' }, '✓ 正常'),
          phpEol ? e('div', { style: { marginTop: 10, fontSize: 11, color: 'var(--red)', lineHeight: 1.6 } }, 'PHP 7.4 は 2022年11月にサポート終了済みです。サーバー管理者にアップグレードを依頼してください。') : null,
          phpEol ? e('button', {
            className: 'scard-btn ' + (phpSt === 'checking' ? 'php-checking' : phpSt === 'done' ? 'done' : 'php-check'),
            onClick: initPhpCheck,
            disabled: phpSt === 'checking'
          }, phpSt === 'checking' ? '互換性チェック中...' : phpSt === 'done' ? '✓ チェック完了（再実行）' : '🔬 PHP 8.2 互換性チェック') : null,
          phpRep ? e('div', { className: 'php-report' }, phpRep) : null
        ),
        e('div', { className: 'scard', style: { '--c': pendingPlugins.length === 0 ? 'var(--green)' : pendingPlugins.length <= 2 ? 'var(--amber)' : 'var(--red)' } },
          e('div', { className: 'scard-label' }, 'プラグイン'),
          e('div', { className: 'scard-ver' }, data.plugins.length, e('span', { style: { fontSize: 14, color: 'var(--t2)', marginLeft: 4 } }, '個')),
          e('div', { className: 'scard-sub' }, '更新待ち: ' + pendingPlugins.length + '個 / アクティブ: ' + data.plugins.filter(function(x) { return x.active; }).length + '個'),
          pendingPlugins.length === 0 ? e('span', { className: 'badge green' }, '✓ すべて最新') : e('span', { className: 'badge red' }, pendingPlugins.length + '件 要更新')
        )
      ),
      e('div', { className: 'section-hdr' },
        e('span', { className: 'section-title' }, 'インストール済みプラグイン'),
        e('span', { className: 'section-sub' }, pendingPlugins.length + '件の更新待ち / 全' + data.plugins.length + '個')
      ),
      e('div', { className: 'ptable' },
        e('div', { className: 'pthead' }, e('span', null, 'プラグイン名'), e('span', null, '現在'), e('span', null, '最新'), e('span', null, '状態'), e('span', null, '')),
        data.plugins.map(function(pl) {
          var st = pst[pl.slug] || 'idle';
          var active = pl.updateAvailable && st !== 'done';
          var busy = st === 'analyzing' || st === 'updating';
          var lbl = { idle: '分析して更新', analyzing: '分析中...', updating: '更新中...', done: '✓ 完了' }[st] || '分析して更新';
          return e('div', { key: pl.slug, className: 'prow' },
            e('div', { className: 'pname' }, pl.name, !pl.active ? e('span', { className: 'inactive-tag' }, '無効') : null),
            e('div', { className: 'pver' }, pl.current),
            e('div', null, active ? e('span', { className: 'pver-new' }, pl.latest) : e('span', { className: 'pver-ok' }, pl.latest)),
            e('div', null, active ? e('span', { className: 'badge amber' }, '要更新') : e('span', { className: 'badge green' }, '最新')),
            e('div', null,
              (active || busy)
                ? e('button', { className: 'upd-btn' + (busy ? ' ' + st : ''), onClick: function() { initPlugin(pl.slug); }, disabled: st !== 'idle' }, lbl)
                : e('button', { className: 'upd-btn done', disabled: true }, '✓ 完了')
            )
          );
        })
      )
    ),
    modal ? e('div', { className: 'modal-overlay', onClick: function(ev) { if (ev.target === ev.currentTarget) setModal(null); } },
      e('div', { className: 'modal-card' },
        e('div', { className: 'modal-hdr' },
          e('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } }, e('span', null, '🔍'), e('span', { className: 'modal-title' }, '更新前リスク分析')),
          e('button', { className: 'modal-close', onClick: function() { setModal(null); } }, '×')
        ),
        e('div', { className: 'modal-body' },
          e('div', { className: 'modal-plugin-name' }, modal.isAll ? '一括更新（' + modal.count + '件）' : modal.plugin && modal.plugin.name),
          !modal.isAll && modal.plugin ? e('div', { className: 'modal-ver' },
            e('span', { style: { color: 'var(--t3)' } }, modal.plugin.current),
            e('span', { style: { color: 'var(--t3)' } }, ' ──→ '),
            e('span', { style: { color: 'var(--amber)', fontFamily: 'var(--mono)' } }, modal.plugin.latest)
          ) : null,
          e('div', { className: 'modal-risk-badge', style: {
            background: modal.riskLevel === '高' ? 'rgba(255,68,85,.13)' : modal.riskLevel === '低' ? 'rgba(27,217,122,.1)' : 'rgba(245,166,35,.1)',
            border: '1px solid ' + (modal.riskLevel === '高' ? 'rgba(255,68,85,.35)' : modal.riskLevel === '低' ? 'rgba(27,217,122,.3)' : 'rgba(245,166,35,.3)'),
            color: modal.riskLevel === '高' ? 'var(--red)' : modal.riskLevel === '低' ? 'var(--green)' : 'var(--amber)'
          } },
            e('span', null, modal.riskLevel === '高' ? '🔴' : modal.riskLevel === '低' ? '🟢' : '🟡'),
            e('span', null, modal.riskLevel + 'リスク')
          )
        ),
        modal.isAll && modal.items ? e('div', { className: 'modal-items' }, modal.items.map(function(it, i) { return e('div', { key: i }, '・' + it); })) : null,
        e('div', { className: 'modal-divider' }),
        e('div', { className: 'modal-analysis' }, modal.analysis),
        e('div', { className: 'modal-divider' }),
        e('div', { className: 'modal-footer' },
          e('button', { className: 'modal-cancel', onClick: function() { setModal(null); } }, 'キャンセル'),
          e('button', { className: 'modal-ok' + (modal.riskLevel === '高' ? ' danger' : ''), onClick: modal.onOk },
            modal.riskLevel === '高' ? '⚠ リスクを承知で更新する' : '内容を確認した上で更新する →'
          )
        )
      )
    ) : null,
    toast ? e('div', { className: 'toast' }, toast) : null
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
